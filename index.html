<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBTi SME Readiness Assessment</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* SustainOS brand — light theme.
       Variable names are kept from the original (e.g. --purple) so existing
       CSS and JS references keep working; --purple now holds the brand indigo. */
    --purple: #6E6CFF;        /* brand indigo — primary accent (headings, links, primary button) */
    --purple-dark: #4F4DD6;   /* indigo, darker — hover/active */
    --purple-light: #8A88FF;  /* indigo, lighter */
    --lime: #C8F135;          /* brand lime — CTA + accent fills (never used as text on light) */
    --lime-dark: #AFD81F;     /* lime hover */
    --bg: #F5F4EF;            /* warm cream page canvas */
    --bg2: #FFFFFF;           /* card surface (white) */
    --bg3: #FBFAF6;           /* subtle alt surface */
    --surface: #F7F6F1;       /* inputs, choices, pills — subtle off-white */
    --surface2: #EEEDE7;      /* hover surface */
    --border: #E5E5E5;        /* light gray borders */
    --text: #2B2B2B;          /* charcoal — body + headings */
    --text-muted: #595959;    /* secondary text */
    --text-dim: #8A8A8A;      /* muted / captions */
    --red: #E65E62;           /* brand coral */
    --green: #2FA46E;         /* success green, readable on light */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(110,108,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 90% 80%, rgba(200,241,53,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(245,244,239,0.82);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--lime);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .logo span { color: var(--text-muted); font-weight: 300; }

  .btn-restart {
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-restart:hover { border-color: var(--purple-light); color: var(--text); }

  /* Main container */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 24px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 40px;
    animation: fadeIn 0.4s ease;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .phase-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.3s;
  }
  .phase-label.active { color: var(--purple); }
  .phase-label.done { color: var(--text-muted); }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--lime));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Cards */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--purple);
    background: rgba(110,108,255,0.08);
    border: 1px solid rgba(110,108,255,0.22);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .question-num {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .question-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 22px;
    line-height: 1.35;
    margin-bottom: 28px;
    color: var(--text);
  }

  .sub-question {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Buttons */
  .btn {
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 15px;
    padding: 13px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--purple);
    color: #fff;
  }
  .btn-primary:hover { background: var(--purple-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(110,108,255,0.30); }

  .btn-lime {
    background: var(--lime);
    color: #2B2B2B;
    font-weight: 600;
  }
  .btn-lime:hover { background: var(--lime-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(175,216,31,0.45); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-outline:hover { border-color: var(--purple-light); color: var(--text); }

  .btn-danger {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    color: var(--red);
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  /* Choice buttons */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .choice-btn {
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 400;
    text-align: left;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .choice-btn:hover {
    background: var(--surface2);
    border-color: var(--purple-light);
    color: var(--text);
    transform: translateX(3px);
  }

  /* Checkboxes */
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .checkbox-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .checkbox-item:hover { border-color: var(--purple-light); background: var(--surface2); }
  .checkbox-item.checked { border-color: var(--purple); background: rgba(110,108,255,0.08); }

  .checkbox-item input[type="checkbox"] { display: none; }

  .checkbox-custom {
    width: 20px; height: 20px;
    flex-shrink: 0;
    border: 2px solid var(--text-dim);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }
  .checkbox-item.checked .checkbox-custom {
    background: var(--purple);
    border-color: var(--purple);
  }
  .checkbox-custom::after {
    content: '✓';
    color: #fff;
    font-size: 12px;
    display: none;
  }
  .checkbox-item.checked .checkbox-custom::after { display: block; }

  .checkbox-label {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .checkbox-item.checked .checkbox-label { color: var(--text); }

  /* Text inputs */
  .input-field {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    padding: 13px 18px;
    border-radius: 10px;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 14px;
  }
  .input-field:focus { border-color: var(--purple-light); box-shadow: 0 0 0 3px rgba(110,108,255,0.15); }

  .input-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
  }

  .input-group { margin-bottom: 4px; }

  /* Error message */
  .error-msg {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.25);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* Info note */
  .info-note {
    background: rgba(110,108,255,0.07);
    border: 1px solid rgba(110,108,255,0.18);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Stop screen */
  .stop-card {
    background: rgba(255,77,109,0.05);
    border: 1px solid rgba(255,77,109,0.25);
    border-radius: 16px;
    padding: 40px;
    animation: slideUp 0.35s ease;
  }

  .stop-icon {
    width: 56px; height: 56px;
    background: rgba(255,77,109,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 20px;
  }

  .stop-title {
    font-family: 'Poppins', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 12px;
  }

  .stop-reason {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Calibration screen */
  .calibration-card {
    background: rgba(200,241,53,0.10);
    border: 1px solid rgba(175,216,31,0.30);
    border-radius: 16px;
    padding: 40px;
    animation: slideUp 0.35s ease;
  }

  .calibration-icon {
    width: 56px; height: 56px;
    background: rgba(200,241,53,0.20);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 20px;
  }

  .calibration-title {
    font-family: 'Poppins', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--purple);
    margin-bottom: 16px;
  }

  .summary-list {
    list-style: none;
    margin-bottom: 28px;
  }
  .summary-list li {
    font-size: 14px;
    color: var(--text-muted);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    line-height: 1.4;
  }
  .summary-list li::before {
    content: '›';
    color: var(--purple);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Target option cards */
  .option-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
  }

  .option-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .option-card:not(.disabled):hover { border-color: var(--purple); background: var(--surface2); }
  .option-card.selected { border-color: var(--lime); background: rgba(200,241,53,0.12); }
  .option-card.disabled { opacity: 0.4; cursor: not-allowed; }

  .option-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .option-card-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }

  .option-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text-dim);
  }
  .option-card.selected .option-badge {
    background: var(--lime);
    color: #2B2B2B;
  }

  .option-card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .disabled-reason {
    font-size: 12px;
    color: var(--red);
    opacity: 0.7;
    margin-top: 6px;
    font-style: italic;
  }

  /* Roadmap */
  .roadmap-steps {
    list-style: none;
    margin-bottom: 28px;
  }

  .roadmap-step {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }

  .step-num {
    width: 28px; height: 28px;
    background: var(--purple);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
    font-family: 'Poppins', sans-serif;
  }

  .step-content strong {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    color: var(--text);
  }

  .step-content span {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Report / Extract */
  .report-section {
    margin-bottom: 28px;
  }

  .report-title {
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--purple-light);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .report-row {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .report-key {
    color: var(--text-dim);
    width: 200px;
    flex-shrink: 0;
  }

  .report-val { color: var(--text); }

  .target-language-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--lime);
    padding: 16px 20px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    font-style: italic;
    margin-top: 12px;
  }

  /* Discount badge */
  .discount-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,241,53,0.28);
    border: 1px solid rgba(175,216,31,0.55);
    color: #4A5A0A;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 8px;
    margin-top: 8px;
  }

  /* Help link */
  .help-link {
    color: var(--purple);
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid rgba(110,108,255,0.4);
    transition: color 0.2s;
  }
  .help-link:hover { color: var(--purple-dark); border-color: var(--purple-dark); }

  /* Welcome screen */
  .welcome-title {
    font-family: 'Poppins', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .welcome-title span { color: var(--purple); }

  .welcome-subtitle {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .feature-row {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .feature-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text-muted);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 90px 16px 60px; }
    .card { padding: 28px 22px; }
    .calibration-card { padding: 28px 22px; }
    .stop-card { padding: 28px 22px; }
    .question-text { font-size: 18px; }
    .header { padding: 14px 20px; }
    .report-key { width: 140px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    SBTi SME <span>Assessment</span>
  </div>
  <button class="btn-restart" onclick="startOver()">↺ Start Over</button>
</header>

<div class="container">
  <div id="app"></div>
</div>

<script>
// ─── SUPABASE ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://dajnizibuzsvyofiezlg.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_COSbc9gkD4GsYItdSvdhYw_40I-Rg4k';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  phase: 0,
  step: 'welcome',
  answers: {},
  selectedOption: null,
  companyName: '',
  userName: '',
  userEmail: '',
  assessment_answers: null,
  assessment_results: null
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function parseNum(val) {
  if (val === null || val === undefined || val === '') return NaN;
  return parseFloat(String(val).replace(/[\s,]/g, ''));
}

function currentYear() { return new Date().getFullYear(); }

function calcMinAmbition(baseYear, targetYear) {
  if (baseYear <= 2020) return 4.2 * (targetYear - baseYear);
  else return 4.2 * (targetYear - 2020);
}

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('visible'); }
}

function hideError(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('visible');
}

function progressBar(phase, questionInPhase, totalInPhase) {
  const phaseNames = ['Phase 1', 'Phase 2', 'Phase 3', 'Phase 4'];
  const pct = Math.min(100, Math.round(((phase - 1) / 4 + questionInPhase / totalInPhase / 4) * 100));
  return `
    <div class="progress-wrap">
      <div class="progress-labels">
        ${phaseNames.map((p, i) => `<span class="phase-label ${i + 1 < phase ? 'done' : i + 1 === phase ? 'active' : ''}">${p}</span>`).join('')}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────

function showWelcome() {
  state.step = 'welcome';
  render(`
    <div class="card">
      <div class="welcome-title">Are you ready for<br><span>SBTi SME?</span></div>
      <div class="welcome-subtitle">
        This wizard checks your eligibility for the Science Based Targets initiative SME route,
        calculates your target ambition, and generates a PDF submission extract — in under 5 minutes.
      </div>
      <div class="feature-row">
        <span class="feature-pill">✓ 4-Phase Assessment</span>
        <span class="feature-pill">✓ Instant Eligibility Check</span>
        <span class="feature-pill">✓ Target Calculator</span>
        <span class="feature-pill">✓ PDF Export</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-lime" onclick="startAssessment()">Start Assessment →</button>
      </div>
    </div>
  `);
}

function toggleConsent() {
  document.getElementById('consentCheck').classList.toggle('checked');
}

function startAssessment() {
  state.phase = 1;
  showQ1();
}

// ─── PHASE 1 ─────────────────────────────────────────────────────────────────

function showQ1() {
  state.step = 'q1';
  render(`
    ${progressBar(1, 1, 4)}
    <div class="card">
      <div class="phase-badge">Phase 1 · Eligibility Check</div>
      <div class="question-num">Question 1 of 4</div>
      <div class="question-text">Does your company operate in the Oil & Gas sector, or are you classified as a Financial Institution (FI)?</div>
      <div class="choices">
        <button class="choice-btn" onclick="answerQ1('yes')">Yes — we are in Oil & Gas or are a Financial Institution</button>
        <button class="choice-btn" onclick="answerQ1('no')">No — neither applies to us</button>
      </div>
    </div>

function showPhase3() {
  state.phase = 3;
  state.step = 'p3';
  const a = state.answers;

        <div class="option-card ${!opt2avail ? 'disabled' : ''}" id="opt2" ${opt2avail ? 'onclick="selectOption(2)"' : ''}>

        </div>
      </div>
      <div id="errOpt" class="error-msg"></div>
    </div>
  `);
  window._selectedOpt = null;
}

function selectOption(n) {
  const a = state.answers;
  const opt2avail = a.q8scope3 === 'complete';
  const opt3avail = a.s1 === 0 || a.s2lb === 0;
  if ((n === 2 && !opt2avail) || (n === 3 && !opt3avail)) return;

  window._selectedOpt = n;
  [1, 2, 3].forEach(i => {
    const el = document.getElementById(`opt${i}`);
    if (el) el.classList.toggle('selected', i === n);
  });

  // Show target year inputs
  showTargetYearInputs(n);
}

function showTargetYearInputs(opt) {
  const today = currentYear();
  const minY = today + 5;
  const maxY = today + 10;

  let extra = '';
  if (opt === 1 || opt === 3) {
    extra = `
      <div class="input-group" style="margin-top:20px">
        <label class="input-label">Target Year (must be ${minY}–${maxY})</label>
        <input id="targetYear" class="input-field" type="number" placeholder="e.g. ${minY}" min="${minY}" max="${maxY}">
      </div>
      <div id="errTY" class="error-msg"></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="submitTargetYear(${opt})">Continue →</button></div>
    `;
  } else if (opt === 2) {
    extra = `
      <div style="margin-top:20px">
        <div class="input-group">
          <label class="input-label">Near-Term Target Year (must be ${minY}–${maxY})</label>
          <input id="targetYearNT" class="input-field" type="number" placeholder="e.g. ${minY}" min="${minY}" max="${maxY}">
        </div>
        <div class="input-group">
          <label class="input-label">Long-Term Target Year (must be ≤ 2050)</label>
          <input id="targetYearLT" class="input-field" type="number" placeholder="e.g. 2050" max="2050">
        </div>
      </div>
      <div id="errTY" class="error-msg"></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="submitTargetYear(2)">Continue →</button></div>
    `;
  }

  // Append to card
  const card = document.querySelector('.card');
  // remove existing year input if any
  const existing = document.getElementById('yearInputs');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.id = 'yearInputs';
  div.innerHTML = extra;
  card.appendChild(div);
}

function submitTargetYear(opt) {
  const today = currentYear();
  const minY = today + 5;
  const maxY = today + 10;
  const baseYear = state.answers.baseYear;

  if (opt === 1 || opt === 3) {
    const ty = parseInt(document.getElementById('targetYear').value);
    if (isNaN(ty) || ty < minY || ty > maxY) {
      showError('errTY', `Error: Target Year must be 5–10 years from today (${minY}–${maxY}).`);
      return;
    }
    state.answers.targetYear = ty;
    state.answers.ambition = calcMinAmbition(baseYear, ty);
  } else if (opt === 2) {
    const nt = parseInt(document.getElementById('targetYearNT').value);
    const lt = parseInt(document.getElementById('targetYearLT').value);
    if (isNaN(nt) || nt < minY || nt > maxY) {
      showError('errTY', `Error: Near-Term Target Year must be 5–10 years from today (${minY}–${maxY}).`);
      return;
    }
    if (isNaN(lt) || lt > 2050) {
      showError('errTY', 'Error: Long-Term Target Year must be 2050 or earlier.');
      return;
    }
    state.answers.targetYearNT = nt;
    state.answers.targetYearLT = lt;
    state.answers.ambition = calcMinAmbition(baseYear, nt);
  }
  state.selectedOption = opt;
  showCalibration3(opt);
}

function showCalibration3(opt) {
  state.step = 'cal3';
  const a = state.answers;
  let summary = '';
  const optNames = { 1: 'Near-Term Targets (Standard)', 2: 'Net-Zero Targets (Ambitious)', 3: 'Maintenance Targets (Specific)' };
  if (opt === 1) {
    summary = `Target Year: ${a.targetYear} | Minimum ambition: ${a.ambition.toFixed(1)}% reduction from ${a.baseYear}`;
  } else if (opt === 2) {
    summary = `Near-Term Target Year: ${a.targetYearNT} (min ${a.ambition.toFixed(1)}% reduction) | Long-Term: Net-zero by ${a.targetYearLT}`;
  } else if (opt === 3) {
    summary = `Maintaining zero emissions through ${a.targetYear}`;
  }

  render(`
    <div class="calibration-card">
      <div class="calibration-icon">🎯</div>
      <div class="calibration-title">Phase 3 Complete: Target Selected</div>
      <ul class="summary-list">
        <li>Selected path: ${optNames[opt]}</li>
        <li>${summary}</li>
      </ul>
      <button class="btn btn-lime" onclick="showPhase4()">Continue to Phase 4 →</button>
    </div>
  `);
}

// ─── FINAL REPORT ─────────────────────────────────────────────────────────────

function getTargetLanguage() {
  const a = state.answers;
  const opt = state.selectedOption;
  const company = state.companyName;
  if (opt === 1) {
    return `"${company} commits to reduce absolute scope 1 and scope 2 GHG emissions ${a.ambition.toFixed(1)}% by ${a.targetYear} from a ${a.baseYear} base year, and to measure and reduce its scope 3 emissions."`;
  } else if (opt === 2) {
    return `"${company} commits to reduce absolute scope 1 and scope 2 GHG emissions ${a.ambition.toFixed(1)}% by ${a.targetYearNT} from a ${a.baseYear} base year. ${company} also commits to reduce absolute scope 1, scope 2, and scope 3 GHG emissions by at least 90% by ${a.targetYearLT} from a ${a.baseYear} base year."`;
  } else {
    return `"${company} commits to maintain zero scope ${a.s1 === 0 ? '1' : '2'} emissions through ${a.answers ? a.answers.targetYear : a.targetYear}."`;
  }
}

function getTargetLanguagePlain() {
  const a = state.answers;
  const opt = state.selectedOption;
  const company = state.companyName;
  if (opt === 1) {
    return `${company} commits to reduce absolute scope 1 and scope 2 GHG emissions ${a.ambition.toFixed(1)}% by ${a.targetYear} from a ${a.baseYear} base year, and to measure and reduce its scope 3 emissions.`;
  } else if (opt === 2) {
    return `${company} commits to reduce absolute scope 1 and scope 2 GHG emissions ${a.ambition.toFixed(1)}% by ${a.targetYearNT} from a ${a.baseYear} base year. ${company} also commits to reduce absolute scope 1, scope 2, and scope 3 GHG emissions by at least 90% by ${a.targetYearLT} from a ${a.baseYear} base year.`;
  } else {
    return `${company} commits to maintain zero scope ${a.s1 === 0 ? '1' : '2'} emissions through ${a.targetYear}.`;
  }
}

function showFinalReport() {
  state.step = 'final';
  const a = state.answers;
  const opt = state.selectedOption;
  const optNames = { 1: 'Option 1 — Near-Term Targets (Standard)', 2: 'Option 2 — Net-Zero Targets (Ambitious)', 3: 'Option 3 — Maintenance Targets (Specific)' };

  const targetLang = getTargetLanguage();
  const feeLabel = a.feeDiscount ? '<span class="discount-badge">✓ Eligible for 85% fee discount (~$187.50 instead of $1,250)</span>' : 'Standard fee (~$1,250)';

  let targetDetails = '';
  if (opt === 1) {
    targetDetails = `Target Year: ${a.targetYear} | Minimum reduction: ${a.ambition.toFixed(1)}%`;
  } else if (opt === 2) {
    targetDetails = `Near-Term Target Year: ${a.targetYearNT} (min ${a.ambition.toFixed(1)}%) | Long-Term Net-Zero: ${a.targetYearLT}`;
  } else {
    targetDetails = `Maintaining zero emissions through ${a.targetYear}`;
  }

  render(`
    ${progressBar(4, 2, 2)}
    <div class="calibration-card" style="margin-bottom:24px">
      <div class="calibration-icon">🚀</div>
      <div class="calibration-title">Your SBTi Submission Roadmap</div>
      <ol class="roadmap-steps">
        <li class="roadmap-step"><div class="step-num">1</div><div class="step-content"><strong>Register</strong><span>Create your account on the SBTi Validation Portal.</span></div></li>

        <li class="roadmap-step"><div class="step-num">3</div><div class="step-content"><strong>Submit</strong><span>Copy the data from this app into the "SME Science-Based Target Setting Form" on the portal.</span></div></li>
        <li class="roadmap-step"><div class="step-num">4</div><div class="step-content"><strong>Pay</strong><span>Await invoice: ${a.feeDiscount ? '~$187.50 (85% discount applied)' : 'approx. $1,250'}.</span></div></li>
        <li class="roadmap-step"><div class="step-num">5</div><div class="step-content"><strong>Review</strong><span>SBTi Due Diligence takes approximately 60 days.</span></div></li>
        <li class="roadmap-step"><div class="step-num">6</div><div class="step-content"><strong>Report</strong><span>Once approved, publish GHG inventory and progress annually.</span></div></li>
      </ol>
    </div>

    <div class="card" style="margin-bottom:24px">
      <div class="report-section">
        <div class="report-title">Eligibility Proof</div>
        <div class="report-row"><div class="report-key">Sector check</div><div class="report-val">Not O&G or FI ✓</div></div>
        <div class="report-row"><div class="report-key">Subsidiary</div><div class="report-val">${a.q2_subsidiary === 'yes' ? 'Yes — SME/PE parent ✓' : 'Independent company ✓'}</div></div>
        <div class="report-row"><div class="report-key">Emission threshold</div><div class="report-val">&lt;10,000 tCO₂e ✓ (S1+S2LB = ${(a.s1 + a.s2lb).toLocaleString()} tCO₂e)</div></div>
        <div class="report-row"><div class="report-key">SME criteria met</div><div class="report-val">${a.q4.length} of 4 ✓</div></div>
      </div>

      <div class="report-section">
        <div class="report-title">Emissions Inventory</div>
        <div class="report-row"><div class="report-key">Base Year</div><div class="report-val">${a.baseYear}</div></div>
        <div class="report-row"><div class="report-key">Scope 1</div><div class="report-val">${a.s1.toLocaleString()} tCO₂e</div></div>
        <div class="report-row"><div class="report-key">Scope 2 (Location-Based)</div><div class="report-val">${a.s2lb.toLocaleString()} tCO₂e</div></div>
        <div class="report-row"><div class="report-key">Scope 2 (Market-Based)</div><div class="report-val">${a.s2mb !== null ? a.s2mb.toLocaleString() + ' tCO₂e' : 'Not provided'}</div></div>
        <div class="report-row"><div class="report-key">Exclusions</div><div class="report-val">${a.exclusionPct > 0 ? a.exclusionPct + '%' : 'None'}</div></div>
        <div class="report-row"><div class="report-key">Scope 3 status</div><div class="report-val">${a.q8scope3 === 'complete' ? 'Complete inventory' : 'Not complete / partial'}</div></div>
        <div class="report-row"><div class="report-key">Bioenergy</div><div class="report-val">${a.bioenergy === 'yes' ? 'Yes — must report separately' : 'No bioenergy emissions'}</div></div>
      </div>

      <div class="report-section">
        <div class="report-title">Selected Target</div>

        <div class="report-row"><div class="report-key">Details</div><div class="report-val">${targetDetails}</div></div>
        <div class="report-row"><div class="report-key">Submission fee</div><div class="report-val">${feeLabel}</div></div>
      </div>

      <div class="report-section">
        <div class="report-title">Official Target Language</div>
        <div class="target-language-box">${targetLang}</div>
      </div>

      <div class="report-section">
        <div class="report-title">Get your full report by email</div>

          <label class="input-label">Your email address</label>
          <input id="contactEmail" class="input-field" placeholder="e.g. ana@acmetextiles.com">
        </div>

          <label class="input-label">Your company name</label>
          <input id="contactCompany" class="input-field" placeholder="e.g. Acme Textiles GmbH">

          <div class="checkbox-custom"></div>

        <div class="btn-row">

        </div>
      </div>
    </div>
  `);
}

// ─── CONTACT FORM & REPORT DELIVERY ───────────────────────────────────────────

async function submitContactForm() {
  const name = document.getElementById('contactName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const company = document.getElementById('contactCompany').value.trim();
  const consent = document.getElementById('consentCheck').classList.contains('checked');

  if (!name || !email || !company || !consent) {
    showError('contactErr', 'Please enter your name, email address, and company name, and accept the data terms to continue.');
    return;
  }
  hideError('contactErr');

  state.userName = name;
  state.userEmail = email;
  state.companyName = company;

  const btn = document.getElementById('sendReportBtn');
  if (btn) btn.textContent = 'Sending…';

  // Assemble JSONB payloads from the existing assessment state
  const a = state.answers;
  const opt = state.selectedOption;
  const optNames = { 1: 'Option 1 — Near-Term Targets (Standard)', 2: 'Option 2 — Net-Zero Targets (Ambitious)', 3: 'Option 3 — Maintenance Targets (Specific)' };
  state.assessment_answers = Object.assign({}, a, { selectedOption: opt });
  state.assessment_results = {
    eligibility_outcome: 'eligible',
    ghg_totals: {
      scope1: a.s1,
      scope2_location: a.s2lb,
      scope2_market: a.s2mb,
      scope3_status: a.q8scope3
    },
    base_year: a.baseYear,
    target_path_name: optNames[opt],
    target_language: getTargetLanguagePlain(),
    fee_discount: !!a.feeDiscount
  };

  // Insert the full submission as anon — failure is silent, execution continues regardless
  try {
    await supabaseClient.from('submissions').insert({
      name: state.userName,
      email: state.userEmail,
      company_name: state.companyName,
      assessment_answers: state.assessment_answers,
      assessment_results: state.assessment_results,
      status: 'pending_verification'
    });
  } catch (e) { /* silent — continue to the magic link step regardless */ }

  // Send the magic link
  const { error } = await supabaseClient.auth.signInWithOtp({ email: state.userEmail });
  if (error) {
    showError('contactErr', "We couldn't send your link. Please check your email address and try again.");
    if (btn) btn.textContent = 'Send my report →';
    return;
  }
  showCheckInbox();
}

function showCheckInbox() {
  state.step = 'check_inbox';
  render(`
    <div class="card">
      <div class="welcome-title">Check your<br><span>inbox</span></div>
      <div class="welcome-subtitle">We've sent a link to ${state.userEmail}. Click it to receive your report.</div>
      <div class="info-note">The link expires in 60 minutes. Check your spam folder if you don't see it.</div>
      <a class="help-link" onclick="startOver()" style="cursor:pointer">Start Over</a>
    </div>
  `);
}

function showReportOnItsWay() {
  state.step = 'report_on_its_way';
  render(`
    <div class="card">
      <div class="welcome-title">Your report is<br><span>on its way</span></div>
      <div class="welcome-subtitle">We're generating your personalised report now. It will arrive at ${state.userEmail} within a few minutes.</div>
      <a class="help-link" onclick="startOver()" style="cursor:pointer">Start Over</a>
    </div>
  `);
  triggerReport();
}

async function triggerReport() {
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;
    await fetch('/send-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: session.access_token })
    });
  } catch (e) { /* silent per spec — no error surfaced to the user */ }
}

// ─── STOP SCREEN ─────────────────────────────────────────────────────────────

function showStop(reason) {
  state.step = 'stop';
  render(`
    <div class="stop-card">
      <div class="stop-icon">✕</div>
      <div class="stop-title">Not a fit for the SME Route</div>
      <div class="stop-reason"><strong>Reason:</strong> ${reason}</div>
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:24px">
        If you need help navigating the standard or sector-specific route,
        <a href="https://www.linkedin.com/in/zyad-hatquai/" target="_blank" class="help-link">reach out here</a>.
      </p>
      <button class="btn btn-lime" onclick="startOver()">↺ Start Over</button>
    </div>
  `);
}

// ─── START OVER ───────────────────────────────────────────────────────────────

async function startOver() {
  state.phase = 0;
  state.step = 'welcome';
  state.answers = {};
  state.selectedOption = null;
  state.companyName = '';
  state.userName = '';
  state.userEmail = '';
  state.assessment_answers = null;
  state.assessment_results = null;
  window._q4checked = new Set();
  window._selectedOpt = null;
  try { await supabaseClient.auth.signOut(); } catch (e) { /* ignore */ }
  showWelcome();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
// On every page load, check for an active Supabase session. The JS SDK processes
// the magic-link token in the URL hash automatically when getSession() is called.
(async function init() {
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session && session.user && session.user.email) {
      state.userEmail = session.user.email;
      showReportOnItsWay();
      return;
    }
  } catch (e) { /* fall through to welcome */ }
  showWelcome();
})();
</script>
